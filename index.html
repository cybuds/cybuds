<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cybuds</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>
    <div class="container">
        <main class="content">
            <p class="greeting">Hi, I'm</p>
            <img src="images/cybuds website logo.png" alt="CYBUDS" class="title-image">
            
            <p class="bio">
                Another human being on the internet. I make videos on YouTube and occasionally stream on Twitch.
                I like coding, making art, and sometimes building cool websites. 
            </p>

            <div class="interests">
                <h2>Interests</h2>
                <ul>
                    <li>Coding</li>
                    <li>Gaming</li>
                    <li>Art</li>
                    <li>Web-dev (when I feel like it)</li>
                </ul>
            </div>

            <div class="socials">
                <a href="https://youtube.com/@cybuds" target="_blank" rel="noopener noreferrer" class="social-link" title="YouTube">
                    <i class="bi bi-youtube"></i>
                </a>
                <a href="https://twitter.com/cybudss" target="_blank" rel="noopener noreferrer" class="social-link" title="Twitter/X">
                    <i class="bi bi-twitter-x"></i>
                </a>
                <a href="https://twitch.tv/CybudsLIVE" target="_blank" rel="noopener noreferrer" class="social-link" title="Twitch">
                    <i class="bi bi-twitch"></i>
                </a>
                <a href="https://github.com/cybuds" target="_blank" rel="noopener noreferrer" class="social-link" title="GitHub">
                    <i class="bi bi-github"></i>
                </a>
            </div>
        </main>

        <aside class="recent-videos">
            <h3>Recent Videos</h3>
            <div id="videos-container" class="videos-list">
                <p class="loading">Loading videos...</p>
            </div>
        </aside>

        <footer class="footer">
            <p><span id="year"></span> Cybuds</p>
        </footer>
    </div>

    <!-- Background props - completely static, page border clips them -->
    <div style="position: fixed; top: -292px; left: -292px; width: 641px; height: 608px; z-index: 0; pointer-events: none; filter: drop-shadow(8px 12px 0 rgba(0,0,0,0.47)); transform: rotate(-169deg);">
        <img src="images/bg-props/paper.png" style="width: 100%; height: 100%; object-fit: contain;">
    </div>

    <div style="position: fixed; top: 695px; right: -108px; width: 550px; height: 550px; z-index: 0; pointer-events: none; filter: drop-shadow(-13px -6px 0 rgba(0,0,0,0.47)); transform: rotate(21deg);">
        <img src="images/bg-props/paper.png" style="width: 100%; height: 100%; object-fit: contain;">
    </div>

    <div style="position: fixed; bottom: -195px; left: 118px; width: 380px; height: 410px; z-index: 0; pointer-events: none; filter: drop-shadow(-4px -13px 0 rgba(0,0,0,0.47)); transform: rotate(-28deg);">
        <img src="images/bg-props/paperclip.png" style="width: 100%; height: 100%; object-fit: contain;">
    </div>

    <div style="position: fixed; bottom: 585px; right: 248px; width: 283px; height: 361px; z-index: 0; pointer-events: none; filter: drop-shadow(-13px -6px 0 rgba(0,0,0,0.47)); transform: rotate(21deg);">
        <img src="images/bg-props/paperclip2.png" style="width: 100%; height: 100%; object-fit: contain;">
    </div>

    <style>
        body {
            overflow: hidden;
        }
    </style>

    <script src="wii-warning.js"></script>
    <script src="script.js"></script>
</body>
</html>
